version: "3.9"

services:
  # ── Khipu Finance main app ─────────────────────────────────────
  khipu:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PORT=5000
      - FINNHUB_KEY=${FINNHUB_KEY}
      - FMP_KEY=${FMP_KEY:-}
      - MARKETSTACK_KEY=${MARKETSTACK_KEY:-}
      - ANTHROPIC_KEY=${ANTHROPIC_KEY}
      - ELEVENLABS_KEY=${ELEVENLABS_KEY}
      - ELEVENLABS_AGENT_ID=${ELEVENLABS_AGENT_ID}
      - AV_KEY=${AV_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - RAG_URL=http://rag:5051
      - MIROFISH_URL=http://litellm:4000
    depends_on:
      - rag
      - litellm
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── RAG / Second Brain microservice ───────────────────────────
  rag:
    build: ./rag
    ports:
      - "5051:5051"
    environment:
      - ANTHROPIC_KEY=${ANTHROPIC_KEY}
      - CHROMA_PATH=/data/chroma
      - RAG_PORT=5051
    volumes:
      - chroma_data:/data/chroma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5051/stats"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── LiteLLM proxy (OpenAI → Claude / Gemini) ──────────────────
  # Allows MiroFish (OpenAI SDK) to use Claude without code changes
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_KEY}
      - OPENAI_API_KEY=${OPENAI_KEY:-sk-placeholder}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MiroFish multi-agent simulation ────────────────────────────
  # If you have a MiroFish Docker image, uncomment below
  # mirofish:
  #   image: ${MIROFISH_IMAGE:-mirofish:latest}
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     - OPENAI_API_KEY=${OPENAI_KEY:-sk-placeholder}
  #     - OPENAI_BASE_URL=http://litellm:4000
  #   depends_on:
  #     - litellm
  #   restart: unless-stopped

  # ── Redis cache (optional) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  chroma_data:
