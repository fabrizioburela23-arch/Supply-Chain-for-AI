version: "3.9"

services:
  # ── Khipu Finance main app ─────────────────────────────────────
  khipu:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PORT=5000
      - FINNHUB_KEY=${FINNHUB_KEY}
      - FMP_KEY=${FMP_KEY:-}
      - MARKETSTACK_KEY=${MARKETSTACK_KEY:-}
      - ANTHROPIC_KEY=${ANTHROPIC_KEY}
      - ELEVENLABS_KEY=${ELEVENLABS_KEY}
      - ELEVENLABS_AGENT_ID=${ELEVENLABS_AGENT_ID}
      - AV_KEY=${AV_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - MIROFISH_URL=${MIROFISH_URL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MiroFish multi-agent simulation ────────────────────────────
  # If you have a MiroFish Docker image, uncomment below
  # mirofish:
  #   image: ${MIROFISH_IMAGE:-mirofish:latest}
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     - OPENAI_API_KEY=${OPENAI_KEY:-sk-placeholder}
  #   restart: unless-stopped
